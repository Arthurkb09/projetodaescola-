<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Portal do IE</title>
<style>
body{font-family:Arial,sans-serif;margin:0;background:#f3f3f3}
header{background:#c81010;color:#fff;padding:16px;display:flex;justify-content:space-between;align-items:center}
nav{display:none;position:absolute;background:#fff;color:#333;border:1px solid #ddd}
nav a{display:block;padding:10px;text-decoration:none;color:#333}
nav a:hover{background:#eee}
main{padding:20px}
.card{background:#fff;padding:20px;border-radius:10px}
button{cursor:pointer}
</style>
</head>
<body>
<header>
<div style="position:relative">
<button onclick="m()">☰</button>
<nav id="menu">
    <a href="integral.html">Integral</a>
    <a href="saúde.html">Saúde</a>
    <a href="esportes.html">Esportes</a>
    <a href="saúde digital.html">Saúde Digital</a>
</nav>
</div>
<h1>Portal do IE</h1>
<button><img src="https://www.gstatic.com/firebasejs/ui/2.0.0/images/auth/google.svg" width="18"> Entrar com Google</button>
</header>
<main>
<div class="card">
<h2>Previsão do tempo</h2>
<p id="tempo">Carregando...</p>
</div> 

<div class="notícia">
<h2>Era uma vez, uma menina que se chama Mônica.</h2>
</div>
</main>
<script>
function m(){let n=document.getElementById('menu');n.style.display=n.style.display==='block'?'none':'block';}
fetch('https://api.open-meteo.com/v1/forecast?latitude=-30.03&longitude=-51.23&current=temperature_2m')
.then(r=>r.json()).then(d=>tempo.textContent='Porto Alegre: '+d.current.temperature_2m+'°C')
.catch(()=>tempo.textContent='Não foi possível carregar.');
</script>
</body>

<style>

body{
    font-family:Arial,sans-serif;
    margin:0;
    background:#f3f3f3;

    display:flex;
    flex-direction:column;
    min-height:100vh;
}

main{
    flex:1;
    padding:20px;
}

footer{
    background:#c81010;
    color:white;
    text-align:center;
    padding:20px;
    width:100%;
}

footer p{
    margin:8px 0;
}

</style>

</head>

</html>
